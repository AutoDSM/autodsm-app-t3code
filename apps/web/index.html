<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#161616" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#161616" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script>
      (() => {
        const isComponentPreviewRuntime =
          window.location.pathname === "/component-preview-runtime" ||
          window.location.pathname.endsWith("/component-preview-runtime");
        if (isComponentPreviewRuntime) {
          document.documentElement.dataset.componentPreviewRuntime = "1";
        }

        const LIGHT_BACKGROUND = "#ffffff";
        const DARK_BACKGROUND = "#161616";
        const themeColorMeta = document.querySelector('meta[name="theme-color"]');
        try {
          const storedTheme = window.localStorage.getItem("t3code:theme");
          const theme =
            storedTheme === "light" || storedTheme === "dark" || storedTheme === "system"
              ? storedTheme
              : "system";
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const isDark = theme === "dark" || (theme === "system" && prefersDark);
          document.documentElement.classList.toggle("dark", isDark);
          // The preview runtime is composited over the product surface (iframe /
          // native view) and must stay transparent so the canvas card shows
          // through. The `.dark` class above still applies so component tokens
          // resolve in the right mode.
          const chromeColor = isComponentPreviewRuntime
            ? "transparent"
            : isDark
              ? DARK_BACKGROUND
              : LIGHT_BACKGROUND;
          document.documentElement.style.backgroundColor = chromeColor;
          themeColorMeta?.setAttribute("content", chromeColor);
        } catch {
          document.documentElement.classList.add("dark");
          const chromeColor = isComponentPreviewRuntime ? "transparent" : DARK_BACKGROUND;
          document.documentElement.style.backgroundColor = chromeColor;
          themeColorMeta?.setAttribute("content", chromeColor);
        }
      })();
    </script>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: #ffffff;
        color: #262626;
        font-family:
          "DM Sans",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          system-ui,
          sans-serif;
      }

      html.dark body {
        background: #161616;
        color: #f5f5f5;
      }

      #boot-shell {
        display: flex;
        min-height: 100%;
        align-items: center;
        justify-content: center;
        background: inherit;
      }

      #boot-shell-card {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 96px;
        height: 96px;
      }

      .boot-shell-watermark {
        width: 64px;
        height: 64px;
        object-fit: contain;
      }

      .boot-shell-watermark--dark {
        display: none;
      }

      html.dark .boot-shell-watermark:not(.boot-shell-watermark--dark) {
        display: none;
      }

      html.dark .boot-shell-watermark--dark {
        display: block;
      }

      html[data-component-preview-runtime="1"] #boot-shell {
        display: none;
      }

      /* The preview runtime composites over the product surface — keep its
         document fully transparent so the canvas card (bg-background) shows
         through. Unlayered + !important so it beats the body rules above and
         index.css's @layer base html/body background. */
      html[data-component-preview-runtime="1"],
      html[data-component-preview-runtime="1"] body {
        background: transparent !important;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&display=swap"
      rel="stylesheet"
    />
    <title>AutoDSM</title>
  </head>
  <body>
    <div id="root">
      <div id="boot-shell">
        <div id="boot-shell-card" aria-label="AutoDSM splash screen">
          <img class="boot-shell-watermark" src="/autodsm/watermark-default.png" alt="AutoDSM" />
          <img
            class="boot-shell-watermark boot-shell-watermark--dark"
            src="/autodsm/watermark-dark.png"
            alt="AutoDSM"
          />
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
