<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Storybook Preview Renderer</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        background: #0b1020;
        color: #eef2ff;
      }
      main {
        max-width: 1080px;
        margin: 0 auto;
        padding: 48px;
      }
      h1 {
        font-size: 42px;
        margin: 0 0 12px;
      }
      h2 {
        margin-top: 32px;
        color: #c4b5fd;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }
      .card {
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.06);
        border-radius: 18px;
        padding: 18px;
      }
      .flow {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .pill {
        padding: 10px 14px;
        border-radius: 999px;
        background: #312e81;
        border: 1px solid #818cf8;
      }
      .muted {
        color: #bac2d9;
      }
      code {
        color: #a7f3d0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Storybook Preview Renderer</h1>
      <p class="muted">
        AutoDSM v1 renders generated stories through a locked-down WebContentsView.
      </p>
      <div class="grid">
        <div class="card">
          <b>StorybookOrchestrator</b>
          <p>Generates stories and starts local server.</p>
        </div>
        <div class="card">
          <b>PreviewView</b>
          <p>Loads selected story URL.</p>
        </div>
        <div class="card">
          <b>Render Health</b>
          <p>Reports component failures.</p>
        </div>
      </div>
    </main>
  </body>
</html>
