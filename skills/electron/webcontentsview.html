<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>WebContentsView Preview</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        background: #0b1020;
        color: #eef2ff;
      }
      main {
        max-width: 1080px;
        margin: 0 auto;
        padding: 48px;
      }
      h1 {
        font-size: 42px;
        margin: 0 0 12px;
      }
      h2 {
        margin-top: 32px;
        color: #c4b5fd;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }
      .card {
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.06);
        border-radius: 18px;
        padding: 18px;
      }
      .flow {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .pill {
        padding: 10px 14px;
        border-radius: 999px;
        background: #312e81;
        border: 1px solid #818cf8;
      }
      .muted {
        color: #bac2d9;
      }
      code {
        color: #a7f3d0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>WebContentsView Preview</h1>
      <p class="muted">Main process owns a sibling preview view pointed at local Storybook.</p>
      <div class="flow">
        <span class="pill">Canvas bounds from renderer</span
        ><span class="pill">Storybook URL from orchestrator</span
        ><span class="pill">Preview view in main</span><span class="pill">Hide for overlays</span
        ><span class="pill">Block external navigation</span>
      </div>
    </main>
  </body>
</html>
